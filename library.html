<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morbflix - Library</title>
    
    <script src="/static/htmx.min.js"></script>
    
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="min-h-screen flex flex-col items-center p-6">
    
    <header class="w-full max-w-4xl flex flex-col sm:flex-row items-center justify-between mb-10 pt-4">
        <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-morb to-red-400 mb-4 sm:mb-0 tracking-tight">
            My Library
        </h2>
        <nav class="flex gap-4">
            <a href="/" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-panel border border-gray-800 hover:border-morb/50 text-gray-300 hover:text-white transition-colors text-sm font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Home
            </a>
            <a href="/downloads" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-panel border border-gray-800 hover:border-morb/50 text-gray-300 hover:text-white transition-colors text-sm font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Downloads
            </a>
        </nav>
    </header>

    <main class="w-full max-w-4xl bg-panel p-6 sm:p-8 rounded-2xl border border-gray-800 shadow-2xl">
        <button hx-post="/htmx/library/scan" hx-target="#movie-list" 
                class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-morb to-red-500 hover:from-red-500 hover:to-red-600 text-white font-bold py-4 px-6 rounded-xl mb-8 transition-all duration-300 shadow-lg shadow-morb/20 transform hover:-translate-y-0.5">
            <svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            Scan Folder for Missing Files
        </button>
        
    <!-- Removed the flex classes from the parent, moved them to an inner div! -->
    <div id="movie-list" hx-get="/htmx/movies" hx-trigger="load" class="min-h-[200px]">
        <div class="w-full h-full flex items-center justify-center py-20">
            <div class="flex items-center gap-3 text-gray-500">
                <svg class="animate-spin h-5 w-5 text-morb" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Loading Library...
            </div>
        </div>
    </div>    
    </main>
</body>
</html>
