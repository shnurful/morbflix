<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morbflix - Library</title>
    
    <script src="/static/htmx.min.js"></script>
    
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="min-h-screen flex flex-col items-center p-6">
    
    <header class="w-full max-w-3xl flex flex-col sm:flex-row items-center justify-between mb-10 pt-4">
        <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-morb to-red-400 mb-4 sm:mb-0 tracking-tight">
            Torrent Engine
        </h2>
        <nav class="flex gap-4">
            <a href="/" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-panel border border-gray-800 hover:border-morb/50 text-gray-300 hover:text-white transition-colors text-sm font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Home
            </a>
            <a href="/library" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-panel border border-gray-800 hover:border-morb/50 text-gray-300 hover:text-white transition-colors text-sm font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                Library
            </a>
        </nav>
    </header>

    <div class="w-full max-w-3xl space-y-6">
        <!-- Add Torrent Panel -->
        <div class="bg-panel p-6 sm:p-8 rounded-2xl border border-gray-800 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <svg class="w-6 h-6 text-morb" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Add Magnet Link
            </h3>
            <form hx-post="/htmx/torrent/add" hx-target="#magnet-input" hx-swap="outerHTML" class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="magnet-input" name="magnet" placeholder="Paste magnet link here..." required 
                    class="flex-1 px-4 py-3 rounded-xl border border-gray-700 bg-panelHover text-white focus:outline-none focus:border-morb focus:ring-1 focus:ring-morb transition-all shadow-inner placeholder-gray-500">
                <button type="submit" class="whitespace-nowrap px-8 py-3 bg-morb hover:bg-red-600 text-white font-bold rounded-xl shadow-lg shadow-morb/20 transition-all duration-300 hover:-translate-y-0.5">
                    Download
                </button>
            </form>
        </div>

        <!-- Active Downloads Panel -->
        <div class="bg-panel p-6 sm:p-8 rounded-2xl border border-gray-800 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <svg class="w-6 h-6 text-morb" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Active Downloads
            </h3>
            <div hx-get="/htmx/torrent/status" hx-trigger="every 2s" hx-swap="innerHTML" class="min-h-[100px] flex items-center justify-center">
                <div class="flex items-center gap-3 text-gray-500">
                    <svg class="animate-spin h-5 w-5 text-morb" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Syncing status...
                </div>
            </div>
        </div>
    </div>
</body>
</html>
