<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morbflix - Library</title>
    
    <script src="/static/htmx.min.js"></script>
    
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-6 bg-black">
    
    <nav class="w-full max-w-5xl flex items-center justify-between mb-6 z-20">
        <h1 class="text-2xl font-black tracking-tight text-morb">Morbflix</h1>
        <div class="flex gap-4">
            <a href="/" class="text-gray-400 hover:text-white font-semibold transition-colors flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> Home
            </a>
            <a href="/library" class="text-gray-400 hover:text-white font-semibold transition-colors flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg> Library
            </a>
        </div>
    </nav>

    <!-- Video Player Wrapper -->
    <div class="relative w-full max-w-5xl bg-black rounded-xl overflow-hidden shadow-[0_0_40px_rgba(255,85,85,0.1)] group border border-gray-900" id="player-wrapper">
        <video id="player" autoplay class="w-full h-auto max-h-[85vh] object-contain block bg-black"></video>
        
        <!-- Controls Overlay -->
        <div class="video-controls absolute bottom-0 left-0 w-full bg-gradient-to-t from-black via-black/80 to-transparent pt-16 pb-4 px-6 flex items-center gap-4 transition-all duration-500 ease-out z-10">
            <button id="play-btn" onclick="togglePlay()" class="text-white hover:text-morb transition-colors transform hover:scale-110 focus:outline-none">
                <!-- Play Icon (Fallback to textual emoji if needed, using SVG for premium feel) -->
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20" id="play-icon-svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
            </button>
            
            <span class="text-sm font-mono text-gray-300 min-w-[3.5rem]" id="time-current">0:00</span>
            
            <div class="flex-grow flex items-center h-full group/slider">
                <input type="range" id="seek-bar" min="0" max="100" value="0" class="w-full h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer focus:outline-none group-hover/slider:h-2 transition-all">
            </div>
            
            <span class="text-sm font-mono text-gray-300 min-w-[3.5rem] text-right" id="time-total">0:00</span>
            
            <button id="cc-btn" onclick="toggleCC()" class="ml-2 font-bold text-sm bg-white/10 hover:bg-white/20 text-white px-2 py-1 rounded transition-colors border border-white/10 focus:outline-none">CC</button>
            
            <button id="fs-btn" onclick="toggleFullscreen()" class="text-white hover:text-morb transition-colors transform hover:scale-110 focus:outline-none ml-2">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
        </div>
    </div>

    <!-- Navigation Inject -->
    <div hx-get="/htmx/video/nav" hx-trigger="load" class="w-full max-w-5xl"></div>

    <script src="/static/hls.min.js"></script>
    <script>
        var hls = null;
        let currentFile = "";
        let currentDuration = 0;
        let currentOffset = 0;
        let isSeeking = false;
        let subsEnabled = false; 

        const video = document.getElementById('player');
        const playBtn = document.getElementById('play-btn');
        const playIconSvg = document.getElementById('play-icon-svg');
        const ccBtn = document.getElementById('cc-btn');
        const seekBar = document.getElementById('seek-bar');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const wrapper = document.getElementById('player-wrapper');

        const svgPlay = `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>`;
        const svgPause = `<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>`;

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const urlVideo = urlParams.get('v');
        const urlDuration = parseInt(urlParams.get('d'));

        if (urlVideo && !isNaN(urlDuration)) {
            playMovie(urlVideo, urlDuration, 0);
        } else {
            window.location.href = "/library";
        }

        function playMovie(filePath, duration, startSec) {
            currentFile = filePath;
            currentDuration = duration;
            currentOffset = startSec;

            seekBar.max = duration;
            timeTotal.innerText = formatTime(duration);

            const subsFlag = subsEnabled ? "1" : "0";
            const streamUrl = `/video/hls/${filePath}/playlist.m3u8?start=${startSec}&subs=${subsFlag}`;

            if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                if (hls) hls.destroy(); 
                hls = new Hls();
                hls.loadSource(streamUrl); 
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().then(() => {
                        playIconSvg.innerHTML = svgPause;
                        resetUI();
                    }).catch(() => { playIconSvg.innerHTML = svgPlay; });
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play().then(() => {
                        playIconSvg.innerHTML = svgPause;
                        resetUI();
                    }).catch(() => { playIconSvg.innerHTML = svgPlay; });
                });
            }
        }

        function togglePlay() {
            if (video.paused) { 
                video.play(); 
                playIconSvg.innerHTML = svgPause;
            } else { 
                video.pause(); 
                playIconSvg.innerHTML = svgPlay;
            }
            resetUI();
        }

        function toggleCC() {
            subsEnabled = !subsEnabled;
            if (subsEnabled) {
                ccBtn.classList.replace('text-white', 'text-morb');
                ccBtn.classList.replace('bg-white/10', 'bg-morb/20');
                ccBtn.classList.replace('border-white/10', 'border-morb/50');
            } else {
                ccBtn.classList.replace('text-morb', 'text-white');
                ccBtn.classList.replace('bg-morb/20', 'bg-white/10');
                ccBtn.classList.replace('border-morb/50', 'border-white/10');
            }
            const actualTime = currentOffset + video.currentTime;
            playMovie(currentFile, currentDuration, Math.floor(actualTime));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (wrapper.requestFullscreen) wrapper.requestFullscreen();
                else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        video.addEventListener('click', togglePlay);
        video.addEventListener('dblclick', toggleFullscreen);

        video.addEventListener('timeupdate', () => {
            if (!isSeeking) {
                const actualTime = currentOffset + video.currentTime;
                seekBar.value = actualTime;
                timeCurrent.innerText = formatTime(actualTime);
            }
        });

        seekBar.addEventListener('input', () => {
            isSeeking = true;
            timeCurrent.innerText = formatTime(seekBar.value);
            resetUI();
        });

        seekBar.addEventListener('change', () => {
            isSeeking = false;
            playMovie(currentFile, currentDuration, parseInt(seekBar.value));
        });

        let hideTimeout;
        function resetUI() {
            wrapper.classList.remove('hide-ui');
            clearTimeout(hideTimeout);
            if (!video.paused) {
                hideTimeout = setTimeout(() => { wrapper.classList.add('hide-ui'); }, 2500);
            }
        }

        wrapper.addEventListener('mousemove', resetUI);
        wrapper.addEventListener('mouseleave', () => { if (!video.paused) wrapper.classList.add('hide-ui'); });
        video.addEventListener('pause', resetUI);
    </script>
</body>
</html>
